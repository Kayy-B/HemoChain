<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Donation Registration</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h2>Blood Donation Registration Form</h2>
        <button id="darkModeToggle" class="dark-mode-toggle">
            <i class="fas fa-moon"></i>
        </button>
    </header>
    <main>
        <form id="donorForm">
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" required>

            <label for="mobNum">Mobile Number:</label>
            <input type="number" id="mobNum" name="mobNum" required>

            <label for="emailID">Email ID:</label>
            <input type="text" id="emailID" name="emailID" required>

            <label for="aadharNum">Aadhar Number:</label>
            <input type="number" id="aadharNum" name="aadharNum" required>

            <label for="residentialAddress">Residential Address:</label>
            <input type="text" id="residentialAddress" name="residentialAddress" required>

            <input type="submit" value="Register">
        </form>

        <div id="message"></div>
    </main>
    <footer>
        <button class="nav-button" style="float: left;" onclick="location.href='../index.html'">
            <i class="fas fa-home"></i> Home
        </button>
        <button class="nav-button" style="float: right;" onclick="history.back()">
            <i class="fas fa-arrow-left"></i> Back
        </button>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.6.0/dist/web3.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
